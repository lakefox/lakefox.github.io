<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style media="screen">
      html {
        font-size: 300px;
      }
    </style>
  </head>
  <body>
    <script type="text/javascript">
      let sum = 0;
      for (var a = 0; a < 1000; a++) {
        let t = new Date().getTime();
        for (var i = 0; i < 5; i++) {
          const data = [...Array(1000).keys()]
          data.find(x => x == parseInt(Math.random()*1000))
          data.find(x => x == parseInt(Math.random()*1000))
        }
        sum += new Date().getTime() - t;
      }
      document.write(sum/1000 + " MS")
    </script>
  </body>
</html>
